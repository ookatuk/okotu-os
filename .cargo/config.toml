[resolver]
version = "2"

[build]
target = "x86_64-unknown-uefi"

[target.x86_64-unknown-uefi]
rustflags = [
    "-Z", "cf-protection=full",
    "-C", "relocation-model=pic",
    "-C", "target-cpu=x86-64-v2",
    "-C", "no-redzone=y",
    "-C", "panic=abort",
    "-C", "no-stack-check",
]

runner = "sh ./scripts/run.sh"

[unstable]
build-std = ["core", "alloc"]